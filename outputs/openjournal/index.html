<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenJournal</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #342c2f;
        --muted: #74656a;
        --paper: #fff8ee;
        --paper-deep: #f9ecd9;
        --mint: #ccebdc;
        --rose: #ffd6de;
        --butter: #ffe9a9;
        --sky: #cfe8ff;
        --lav: #dfd6ff;
        --peach: #ffd8be;
        --line: #7e6e68;
        --shadow: 0 10px 24px rgba(83, 62, 58, 0.14);
        --radius: 8px;
        --font-ui:
          ui-rounded, "Avenir Next", "Segoe UI", system-ui, sans-serif;
        --font-read:
          Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: var(--font-ui);
        background:
          radial-gradient(circle at 14% 10%, rgba(255, 214, 222, 0.75), transparent 18rem),
          radial-gradient(circle at 86% 4%, rgba(204, 235, 220, 0.75), transparent 20rem),
          linear-gradient(180deg, #fff7ef 0%, #f6eadb 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.32;
        background-image:
          linear-gradient(rgba(126, 110, 104, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(126, 110, 104, 0.08) 1px, transparent 1px);
        background-size: 34px 34px;
      }

      a {
        color: inherit;
      }

      button {
        font: inherit;
      }

      .app-shell {
        width: min(1120px, calc(100% - 28px));
        margin: 0 auto;
        padding: 18px 0 42px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--butter);
        box-shadow: 4px 4px 0 #d7b993;
      }

      .brand span:last-child {
        font-weight: 850;
      }

      .nav-action {
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #fffdf7;
        color: var(--ink);
        cursor: pointer;
        min-height: 40px;
        padding: 8px 12px;
      }

      .nav-action:hover {
        background: var(--mint);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.1fr);
        gap: 18px;
        align-items: stretch;
        margin-bottom: 18px;
      }

      .hero-copy,
      .badge-board,
      .entry-card,
      .entry-page {
        border: 2px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero-copy {
        position: relative;
        overflow: hidden;
        min-height: 330px;
        padding: 24px;
        background: linear-gradient(145deg, #fff8ef 0%, #ffe2c9 100%);
      }

      .hero-copy h1 {
        margin: 0;
        font-size: clamp(2.75rem, 9vw, 5.5rem);
        line-height: 0.86;
        letter-spacing: 0;
      }

      .hero-copy p {
        max-width: 31rem;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.55;
      }

      .map-art {
        position: absolute;
        right: 16px;
        bottom: 12px;
        width: min(340px, 82%);
        height: 150px;
      }

      .map-line {
        fill: none;
        stroke: #8f7670;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 7 10;
      }

      .map-dot {
        stroke: #6d5a55;
        stroke-width: 3;
      }

      .badge-board {
        background: #fffdf8;
        padding: 16px;
      }

      .board-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .board-head h2 {
        margin: 0;
        font-size: 1.15rem;
      }

      .board-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.93rem;
      }

      .clear-btn {
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        cursor: pointer;
        min-width: 42px;
        min-height: 38px;
      }

      .clear-btn:disabled {
        cursor: not-allowed;
        opacity: 0.38;
      }

      .badge-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .badge-token {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        min-height: 46px;
        padding: 9px 10px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--badge-bg);
        color: var(--ink);
        cursor: pointer;
        text-align: left;
        box-shadow: 3px 3px 0 rgba(126, 110, 104, 0.22);
      }

      .badge-token[aria-pressed="true"] {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 rgba(126, 110, 104, 0.28);
        outline: 3px solid rgba(52, 44, 47, 0.12);
      }

      .badge-token .name {
        font-weight: 800;
      }

      .badge-token .count {
        display: grid;
        min-width: 26px;
        height: 26px;
        place-items: center;
        border: 2px solid rgba(52, 44, 47, 0.65);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        font-weight: 850;
      }

      .active-row {
        min-height: 32px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .results-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 24px 0 12px;
      }

      .results-head h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .results-head p {
        margin: 0;
        color: var(--muted);
      }

      .entries-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .entry-card {
        position: relative;
        overflow: hidden;
        min-height: 290px;
        padding: 15px;
        background: #fffdf8;
      }

      .entry-card::after {
        content: "";
        position: absolute;
        right: 14px;
        bottom: 12px;
        width: 90px;
        height: 66px;
        border: 2px solid rgba(126, 110, 104, 0.65);
        border-radius: 45% 55% 40% 60%;
        background: var(--card-spot);
        opacity: 0.54;
        transform: rotate(var(--tilt));
      }

      .entry-card h3 {
        position: relative;
        z-index: 1;
        margin: 12px 0 8px;
        font-size: 1.35rem;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .entry-card p {
        position: relative;
        z-index: 1;
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .entry-art {
        display: grid;
        position: relative;
        z-index: 1;
        width: 74px;
        height: 58px;
        place-items: center;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--entry-art-bg);
        font-size: 1.75rem;
        box-shadow: 4px 4px 0 rgba(126, 110, 104, 0.22);
      }

      .mini-badges,
      .entry-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .mini-badges {
        position: relative;
        z-index: 1;
        margin-top: 13px;
      }

      .mini-badge,
      .entry-badge {
        border: 1.5px solid rgba(52, 44, 47, 0.5);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 760;
        padding: 4px 8px;
      }

      .open-entry {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        min-height: 42px;
        padding: 8px 12px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper-deep);
        color: var(--ink);
        cursor: pointer;
        font-weight: 850;
        text-decoration: none;
      }

      .open-entry:hover {
        background: var(--butter);
      }

      .hidden {
        display: none !important;
      }

      .entry-page {
        overflow: hidden;
        background: #fffdf8;
      }

      .entry-hero {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
        padding: 22px;
        background: var(--entry-art-bg);
        border-bottom: 2px solid var(--line);
      }

      .entry-hero-art {
        display: grid;
        width: 110px;
        height: 92px;
        place-items: center;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 5px 5px 0 rgba(126, 110, 104, 0.2);
        font-size: 2.6rem;
      }

      .entry-hero h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4.6rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .entry-hero p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.5;
      }

      .entry-body {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 34px;
      }

      .entry-badges {
        margin-bottom: 18px;
      }

      .entry-section {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 2px dotted rgba(126, 110, 104, 0.42);
      }

      .entry-section h2 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      .entry-section p,
      .entry-section li {
        color: #4c4244;
        font-family: var(--font-read);
        font-size: 1.08rem;
        line-height: 1.72;
      }

      .entry-section p {
        margin: 0;
      }

      .entry-section ul {
        margin: 0;
        padding-left: 20px;
      }

      .empty-state {
        padding: 18px;
        border: 2px dashed var(--line);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.72);
      }

      @media (prefers-reduced-motion: no-preference) {
        .view {
          animation: paper-in 210ms ease-out;
        }

        .badge-token,
        .open-entry,
        .nav-action,
        .clear-btn {
          transition:
            transform 160ms ease,
            background 160ms ease,
            box-shadow 160ms ease;
        }
      }

      @keyframes paper-in {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 860px) {
        .hero,
        .entries-grid {
          grid-template-columns: 1fr;
        }

        .hero-copy {
          min-height: 280px;
        }

        .entries-grid {
          gap: 12px;
        }
      }

      @media (max-width: 560px) {
        .app-shell {
          width: min(100% - 20px, 1120px);
          padding-top: 12px;
        }

        .topbar {
          align-items: flex-start;
        }

        .hero-copy,
        .badge-board,
        .entry-card {
          padding: 13px;
        }

        .hero-copy h1 {
          font-size: clamp(2.45rem, 18vw, 4.2rem);
        }

        .badge-grid {
          grid-template-columns: 1fr;
        }

        .results-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .entry-hero {
          grid-template-columns: 1fr;
          padding: 16px;
        }

        .entry-hero-art {
          width: 88px;
          height: 76px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <nav class="topbar" aria-label="Main">
        <a class="brand" href="#/" data-home-link>
          <span class="brand-mark" aria-hidden="true">✦</span>
          <span>OpenJournal</span>
        </a>
        <button class="nav-action hidden" type="button" data-back>Back to entries</button>
      </nav>

      <section class="view" data-home-view>
        <header class="hero">
          <section class="hero-copy" aria-labelledby="site-title">
            <h1 id="site-title">OpenJournal</h1>
            <p>
              Organized public notes about things I did, tried, learned, finished,
              avoided quitting, or kept moving anyway.
            </p>
            <svg class="map-art" viewBox="0 0 360 160" role="img" aria-label="Tiny dotted map path">
              <path class="map-line" d="M18 122 C 74 38, 120 144, 170 82 S 272 30, 336 104" />
              <circle class="map-dot" cx="18" cy="122" r="12" fill="#ffd6de" />
              <circle class="map-dot" cx="170" cy="82" r="12" fill="#ccebdc" />
              <circle class="map-dot" cx="336" cy="104" r="12" fill="#cfe8ff" />
              <path d="M74 56 l14 -30 l14 30 z" fill="#ffe9a9" stroke="#6d5a55" stroke-width="3" />
              <path d="M238 54 l20 -22 l20 22 l-8 38 h-24 z" fill="#dfd6ff" stroke="#6d5a55" stroke-width="3" />
            </svg>
          </section>

          <aside class="badge-board" aria-labelledby="badge-title">
            <div class="board-head">
              <div>
                <h2 id="badge-title">Badge table</h2>
                <p>Pick badges. Matches must include every selected badge.</p>
              </div>
              <button class="clear-btn" type="button" aria-label="Clear selected badges" data-clear>×</button>
            </div>
            <div class="badge-grid" data-badge-grid></div>
            <div class="active-row" data-active-row>No badges selected.</div>
          </aside>
        </header>

        <section aria-labelledby="entries-title">
          <div class="results-head">
            <h2 id="entries-title">Entries</h2>
            <p data-results-count></p>
          </div>
          <div class="entries-grid" data-entries-grid></div>
          <div class="empty-state hidden" data-empty>
            No entries match every selected badge.
          </div>
        </section>
      </section>

      <article class="view entry-page hidden" data-entry-view></article>
    </main>

    <script>
      const entries = [
        {
          id: "refining-github-with-ai",
          title: "Refining My GitHub With AI",
          icon: "⌘",
          color: "#cfe8ff",
          spot: "#ffe9a9",
          badges: ["AI Practice", "Public Work", "GitHub", "Creative Systems"],
          summary:
            "I bought a new computer for AI practice, with local AI as future target. Then I used feedback from professionals, personal connections, and other profiles to reshape my GitHub into something clearer.",
          sentences: [
            "I wanted my public work to look less accidental.",
            "AI became practice equipment, not decoration."
          ],
          happened:
            "I treated my GitHub like a public workshop. I made repos, revised my profile, compared examples, asked for feedback, and kept adjusting until it felt less random.",
          artifact: [
            "GitHub profile changes",
            "Repo cleanup",
            "AI-assisted writing passes",
            "New computer setup for future local AI work"
          ],
          links: "Open space for future post links."
        },
        {
          id: "commitment-to-work-despite-feelings",
          title: "Commitment To Do Work Despite Feelings",
          icon: "☑",
          color: "#ffd6de",
          spot: "#ccebdc",
          badges: ["Work Ethic", "Boundaries", "Discipline", "Store Life"],
          summary:
            "I was not fond of my job, but I did not quit. I stayed, kept doing my work, and decided my effort still needed purpose.",
          sentences: [
            "Showing up did not mean handing over my judgment.",
            "I can work fast, stay in my lane, and still expect purpose."
          ],
          happened:
            "I persisted. My turnaround on work is typically quick, but I am not accepting every task as automatically meaningful. If work is given to me, it needs a reason. The store is still struggling, but that is not mine to carry.",
          artifact: [
            "Completed work",
            "Clearer boundaries",
            "Purpose check before accepting tasks"
          ],
          links: "Open space for future post links."
        },
        {
          id: "working-out-getting-fit",
          title: "Working Out, Getting Fit",
          icon: "▲",
          color: "#ccebdc",
          spot: "#ffd8be",
          badges: ["Fitness", "Consistency", "Self-Pace", "Health"],
          summary:
            "I am inconsistent with working out, and I am okay with that. I still train more than most people, and I am respecting my effort without turning it into self-punishment.",
          sentences: [
            "The work counts even when the schedule is uneven.",
            "I can push at my pace without making inconsistency into a failure story."
          ],
          happened:
            "I keep training. Some weeks are stronger than others. I could put in more effort, but I am not using that as a reason to be bummed out. I am building by continuing.",
          artifact: ["Workout log", "Routine notes", "Progress markers"],
          links: "Open space for future post links."
        }
      ];

      const badgeColors = ["#cfe8ff", "#ffd6de", "#ccebdc", "#ffe9a9", "#dfd6ff", "#ffd8be"];
      const state = {
        selectedBadges: new Set()
      };

      const badgeGrid = document.querySelector("[data-badge-grid]");
      const entriesGrid = document.querySelector("[data-entries-grid]");
      const resultsCount = document.querySelector("[data-results-count]");
      const activeRow = document.querySelector("[data-active-row]");
      const clearButton = document.querySelector("[data-clear]");
      const emptyState = document.querySelector("[data-empty]");
      const homeView = document.querySelector("[data-home-view]");
      const entryView = document.querySelector("[data-entry-view]");
      const backButton = document.querySelector("[data-back]");

      function getBadges() {
        const counts = new Map();
        entries.forEach((entry) => {
          entry.badges.forEach((badge) => {
            counts.set(badge, (counts.get(badge) || 0) + 1);
          });
        });
        return [...counts.entries()].map(([name, count], index) => ({
          name,
          count,
          color: badgeColors[index % badgeColors.length]
        }));
      }

      function entryMatches(entry) {
        return [...state.selectedBadges].every((badge) => entry.badges.includes(badge));
      }

      function renderBadges() {
        badgeGrid.innerHTML = "";
        getBadges().forEach((badge) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "badge-token";
          button.style.setProperty("--badge-bg", badge.color);
          button.setAttribute("aria-pressed", String(state.selectedBadges.has(badge.name)));
          button.innerHTML = `<span class="name">${badge.name}</span><span class="count">${badge.count}</span>`;
          button.addEventListener("click", () => {
            if (state.selectedBadges.has(badge.name)) {
              state.selectedBadges.delete(badge.name);
            } else {
              state.selectedBadges.add(badge.name);
            }
            renderHome();
          });
          badgeGrid.append(button);
        });
      }

      function renderEntries() {
        const visible = entries.filter(entryMatches);
        entriesGrid.innerHTML = "";
        visible.forEach((entry, index) => {
          const card = document.createElement("article");
          card.className = "entry-card";
          card.style.setProperty("--entry-art-bg", entry.color);
          card.style.setProperty("--card-spot", entry.spot);
          card.style.setProperty("--tilt", index % 2 === 0 ? "-4deg" : "4deg");
          card.innerHTML = `
            <div class="entry-art" aria-hidden="true">${entry.icon}</div>
            <h3>${entry.title}</h3>
            <p>${entry.summary}</p>
            <div class="mini-badges">${entry.badges.map((badge) => `<span class="mini-badge">${badge}</span>`).join("")}</div>
            <a class="open-entry" href="#/entry/${entry.id}">Open entry →</a>
          `;
          entriesGrid.append(card);
        });

        resultsCount.textContent = `${visible.length} of ${entries.length} shown`;
        emptyState.classList.toggle("hidden", visible.length > 0);
      }

      function renderActiveRow() {
        const selected = [...state.selectedBadges];
        activeRow.textContent = selected.length
          ? `Filtering by: ${selected.join(" + ")}`
          : "No badges selected.";
        clearButton.disabled = selected.length === 0;
      }

      function renderHome() {
        renderBadges();
        renderActiveRow();
        renderEntries();
      }

      function renderEntry(entry) {
        entryView.style.setProperty("--entry-art-bg", entry.color);
        entryView.innerHTML = `
          <header class="entry-hero">
            <div class="entry-hero-art" aria-hidden="true">${entry.icon}</div>
            <div>
              <h1>${entry.title}</h1>
              <p>${entry.summary}</p>
            </div>
          </header>
          <div class="entry-body">
            <div class="entry-badges">
              ${entry.badges.map((badge) => `<span class="entry-badge">${badge}</span>`).join("")}
            </div>
            <section class="entry-section">
              <h2>Two sentences</h2>
              <p>${entry.sentences.join(" ")}</p>
            </section>
            <section class="entry-section">
              <h2>What happened</h2>
              <p>${entry.happened}</p>
            </section>
            <section class="entry-section">
              <h2>Artifact</h2>
              <ul>${entry.artifact.map((item) => `<li>${item}</li>`).join("")}</ul>
            </section>
            <section class="entry-section">
              <h2>Possible links</h2>
              <p>${entry.links}</p>
            </section>
          </div>
        `;
      }

      function showHome() {
        homeView.classList.remove("hidden");
        entryView.classList.add("hidden");
        backButton.classList.add("hidden");
        renderHome();
      }

      function showEntry(id) {
        const entry = entries.find((item) => item.id === id);
        if (!entry) {
          location.hash = "#/";
          return;
        }
        renderEntry(entry);
        homeView.classList.add("hidden");
        entryView.classList.remove("hidden");
        backButton.classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function route() {
        const match = location.hash.match(/^#\/entry\/(.+)$/);
        if (match) {
          showEntry(match[1]);
        } else {
          showHome();
        }
      }

      clearButton.addEventListener("click", () => {
        state.selectedBadges.clear();
        renderHome();
      });

      backButton.addEventListener("click", () => {
        location.hash = "#/";
      });

      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
